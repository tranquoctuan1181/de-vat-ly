<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tổng ôn Chương 3: Từ trường — 60 câu</title>
<script>
  window.MathJax = { tex: { inlineMath: [["$","$"]], displayMath: [["$$","$$"]] }, startup: { typeset: false } };
</script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f5f7fa; color: #1a1a1a; padding: 16px; }
.card { background: #fff; border-radius: 12px; border: 1px solid #e0e6ef; padding: 20px; margin-bottom: 14px; max-width: 600px; margin-left: auto; margin-right: auto; }
.screen { display: none; }
.screen.active { display: block; }
.btn { display: inline-flex; align-items: center; justify-content: center; padding: 11px 20px; border-radius: 10px; border: 1px solid #d0d7e3; background: #fff; font-size: 15px; font-weight: 500; cursor: pointer; width: 100%; margin-bottom: 8px; }
.btn-primary { background: #1a56a0; color: #fff; border-color: #1a56a0; }
.btn-green   { background: #1d7a4f; color: #fff; border-color: #1d7a4f; }
.choice-btn { width: 100%; text-align: left; padding: 12px 14px; border: 1px solid #e0e6ef; border-radius: 10px; background: #fff; font-size: 14px; margin-bottom: 8px; cursor: pointer; }
.choice-btn.selected { background: #ebf2fb; border-color: #1a56a0; font-weight: 500; }
.progress { height: 5px; background: #e0e6ef; border-radius: 3px; margin-bottom: 16px; }
.progress-fill { height: 100%; background: #1a56a0; border-radius: 3px; transition: width .3s; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.input-field { width: 100%; padding: 10px 12px; border: 1px solid #d0d7e3; border-radius: 10px; font-size: 15px; margin-bottom: 10px; }
.score-circle { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #1a56a0; background: #ebf2fb; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 12px; }
.dot { width:32px;height:32px;border-radius:50%;border:1px solid #d0d7e3;background:#fff;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#555; }
.dot.current { background:#1a56a0;color:#fff;border-color:#1a56a0; }
.dot.answered { background:#e6f4ee;border-color:#1d7a4f;color:#1d7a4f; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="s-login" class="screen">
  <div class="card" style="margin-top:40px; text-align:center">
    <div style="font-size:20px;font-weight:700;margin-bottom:4px">Tổng ôn Chương 3: Từ trường — 60 câu</div>
    <div style="font-size:13px;color:#888;margin-bottom:16px">Vật lý 12 · Có tính năng làm lại câu sai</div>
    <input id="inp-name"  class="input-field" placeholder="Họ và tên" />
    <input id="inp-class" class="input-field" placeholder="Lớp" />
    <button class="btn btn-primary" onclick="startTest()">Bắt đầu →</button>
  </div>
</div>

<!-- TEST -->
<div id="s-test" class="screen">
  <div class="card">
    <p id="q-text" style="font-size:15px;font-weight:500;line-height:1.7;margin-bottom:16px"></p>
    <div id="choices"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn" id="btn-prev" onclick="prevQ()" style="flex:1">← Trước</button>
      <button class="btn btn-primary" id="btn-next" onclick="nextQ()" style="flex:2">Tiếp →</button>
    </div>
    <div style="margin-top:16px">
      <div style="display:flex;justify-content:space-between;font-size:13px;color:#666;margin-bottom:6px">
        <span id="q-counter"></span>
        <span id="round-label" style="color:#1a56a0;font-weight:600"></span>
      </div>
      <div class="progress"><div class="progress-fill" id="progress"></div></div>
      <div id="dot-nav" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px"></div>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="s-result" class="screen">
  <div class="card" style="text-align:center;margin-top:20px">
    <div class="score-circle">
      <div id="score-num" style="font-size:28px;font-weight:700;color:#0c447c"></div>
      <div style="font-size:11px;color:#1a56a0">/10</div>
    </div>
    <div id="result-name" style="font-size:17px;font-weight:700;margin-bottom:4px"></div>
    <div id="round-badge" style="margin-bottom:8px"></div>
  </div>

  <div id="hist-card" class="card" style="display:none">
    <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:8px">Lịch sử lượt</div>
    <div id="hist-rows"></div>
  </div>

  <div id="detail-card" class="card">
    <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:8px">Câu sai lượt này</div>
    <div id="detail-rows"></div>
  </div>

  <div id="plan-card" class="card">
    <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:8px">Kiến thức bổ trợ</div>
    <div id="plan-rows"></div>
  </div>

  <div style="max-width:600px;margin:0 auto">
    <button id="btn-retry"   class="btn btn-primary" style="display:none" onclick="startRetry()"></button>
    <button id="btn-save"    class="btn btn-green"   onclick="doSave()">Lưu kết quả & Kiến thức bổ trợ</button>
    <button id="btn-restart" class="btn"             onclick="restartFull()">Làm lại từ đầu</button>
  </div>
</div>

<script>
/* === DỮ LIỆU === */
var QS = [
  /* ===== KHÁI NIỆM TỪ TRƯỜNG ===== */
  { id:1, topic:"Khái niệm từ trường", level:"NB",
    text:"Từ trường xuất hiện xung quanh vật nào sau đây?",
    choices:["Điện tích đứng yên",
             "Nam châm, dòng điện và điện tích chuyển động",
             "Chỉ nam châm vĩnh cửu",
             "Chỉ dòng điện một chiều"],
    ans:1,
    explain:"Từ trường xuất hiện xung quanh <b>nam châm, dòng điện và điện tích chuyển động</b> — đây là ba nguồn tạo ra từ trường. Điện tích đứng yên không tạo ra từ trường." },

  { id:2, topic:"Khái niệm từ trường", level:"NB",
    text:"Đặc trưng của từ trường là đại lượng nào?",
    choices:["Cường độ điện trường $\\vec{E}$",
             "Cảm ứng từ $\\vec{B}$ (đơn vị Tesla)",
             "Điện thế $V$",
             "Lực điện $\\vec{F}$"],
    ans:1,
    explain:"Đặc trưng của từ trường là <b>vectơ cảm ứng từ $\\vec{B}$</b>, đơn vị Tesla (T). Tại mỗi điểm trong từ trường có một vectơ $\\vec{B}$ xác định." },

  { id:3, topic:"Khái niệm từ trường", level:"NB",
    text:"Để phát hiện sự tồn tại của từ trường tại một điểm, người ta dùng",
    choices:["Điện kế nhạy",
             "Kim nam châm nhỏ",
             "Điện nghiệm",
             "Bình điện phân"],
    ans:1,
    explain:"Người ta dùng <b>kim nam châm nhỏ</b> để phát hiện từ trường. Khi không có từ trường, kim nằm theo hướng Nam–Bắc địa lý; khi có từ trường, kim lệch đi." },

  { id:4, topic:"Khái niệm từ trường", level:"NB",
    text:"Hướng của từ trường tại một điểm được quy ước là",
    choices:["Hướng từ Bắc sang Nam của kim nam châm thử",
             "Hướng từ Nam sang Bắc của kim nam châm thử khi cân bằng",
             "Hướng chuyển động của điện tích dương",
             "Hướng của lực điện tác dụng lên điện tích"],
    ans:1,
    explain:"Quy ước: hướng của $\\vec{B}$ tại một điểm là hướng <b>từ Nam sang Bắc</b> của kim nam châm thử khi cân bằng tại điểm đó." },

  { id:5, topic:"Khái niệm từ trường", level:"TH",
    text:"Hai dòng điện thẳng song song cùng chiều thì",
    choices:["Đẩy nhau",
             "Hút nhau",
             "Không tương tác",
             "Vừa hút vừa đẩy"],
    ans:1,
    explain:"Hai dòng điện song song <b>cùng chiều hút nhau</b>, ngược chiều đẩy nhau. Đây là tương tác từ giữa hai dòng điện." },

  { id:6, topic:"Khái niệm từ trường", level:"TH",
    text:"Điện tích $q$ chuyển động với vận tốc $\\vec{v}$. Phát biểu nào sau đây đúng?",
    choices:["Điện tích chuyển động không tạo ra từ trường",
             "Điện tích chuyển động tạo ra từ trường xung quanh nó",
             "Chỉ điện tích dương mới tạo ra từ trường",
             "Từ trường do điện tích chuyển động chỉ tồn tại trong môi trường chân không"],
    ans:1,
    explain:"<b>Điện tích chuyển động tạo ra từ trường</b> xung quanh nó. Đây là bản chất của từ trường: dòng điện (điện tích chuyển động) và từ trường có cùng bản chất." },

  /* ===== ĐƯỜNG SỨC TỪ ===== */
  { id:7, topic:"Đường sức từ", level:"NB",
    text:"Đường sức từ có tính chất nào sau đây?",
    choices:["Là các đường thẳng luôn song song nhau",
             "Là các đường cong khép kín, không cắt nhau",
             "Xuất phát từ cực Nam và kết thúc ở cực Bắc",
             "Chỉ tồn tại bên ngoài nam châm"],
    ans:1,
    explain:"Đường sức từ là các <b>đường cong khép kín</b> (bên ngoài nam châm: ra từ cực Bắc, vào cực Nam; bên trong: ngược chiều). Các đường sức từ <b>không bao giờ cắt nhau</b>." },

  { id:8, topic:"Đường sức từ", level:"NB",
    text:"Nơi nào có từ trường mạnh hơn?",
    choices:["Nơi đường sức từ thưa",
             "Nơi đường sức từ dày (gần nhau)",
             "Nơi đường sức từ song song",
             "Nơi không có đường sức từ"],
    ans:1,
    explain:"Quy ước: vẽ <b>dày</b> ở nơi từ trường mạnh, <b>thưa</b> ở nơi từ trường yếu. Đây là cách biểu diễn độ lớn của $\\vec{B}$ qua mật độ đường sức." },

  { id:9, topic:"Đường sức từ", level:"NB",
    text:"Từ trường đều có đặc điểm đường sức từ như thế nào?",
    choices:["Các đường cong cách đều nhau",
             "Các đường thẳng, song song, cùng chiều và cách đều nhau",
             "Các đường tròn đồng tâm",
             "Các đường xoắn ốc"],
    ans:1,
    explain:"Từ trường đều có <b>đường sức từ là những đường thẳng, song song, cùng chiều và cách đều nhau</b>. Ví dụ: từ trường trong lòng ống dây dài hoặc giữa hai cực nam châm hình chữ U." },

  { id:10, topic:"Đường sức từ", level:"TH",
    text:"Chiều của đường sức từ bên ngoài nam châm thẳng là",
    choices:["Từ cực Nam (S) đến cực Bắc (N)",
             "Từ cực Bắc (N) đến cực Nam (S)",
             "Tuỳ hướng đặt nam châm",
             "Luôn hướng thẳng đứng lên trên"],
    ans:1,
    explain:"Bên ngoài nam châm, đường sức từ đi ra từ <b>cực Bắc (N)</b> và đi vào <b>cực Nam (S)</b>. Bên trong nam châm, chiều ngược lại để tạo thành đường cong khép kín." },

  { id:11, topic:"Đường sức từ", level:"TH",
    text:"Từ phổ thu được bằng cách",
    choices:["Nhúng nam châm vào nước",
             "Rắc mạt sắt lên tấm nhựa trong đặt trong từ trường rồi gõ nhẹ",
             "Dùng điện kế đo từ trường",
             "Sử dụng kính hiển vi điện tử"],
    ans:1,
    explain:"<b>Từ phổ</b> là hình ảnh cụ thể về đường sức từ, thu được bằng cách <b>rắc mạt sắt lên tấm nhựa trong đặt trong từ trường</b> rồi gõ nhẹ. Nơi mạt sắt dày = từ trường mạnh." },

  { id:12, topic:"Đường sức từ", level:"VD",
    text:"Tại điểm M trong từ trường, vectơ $\\vec{B}$ có chiều từ Đông sang Tây. Kim nam châm thử đặt tại M sẽ định hướng như thế nào?",
    choices:["Cực Bắc hướng Đông, cực Nam hướng Tây",
             "Cực Bắc hướng Tây, cực Nam hướng Đông",
             "Cực Bắc hướng Bắc, cực Nam hướng Nam",
             "Kim không định hướng"],
    ans:0,
    explain:"Chiều $\\vec{B}$ là hướng từ Nam sang Bắc của kim nam châm. Nếu $\\vec{B}$ từ Đông sang Tây thì <b>cực Bắc của kim hướng Đông</b> (cùng chiều $\\vec{B}$), cực Nam hướng Tây." },

  /* ===== CẢM ỨNG TỪ DÂY THẲNG ===== */
  { id:13, topic:"Cảm ứng từ dây thẳng", level:"NB",
    text:"Công thức tính cảm ứng từ tại điểm cách dây dẫn thẳng dài vô hạn mang dòng $I$ một khoảng $r$ là",
    choices:["$B = 4\\pi\\times10^{-7}\\dfrac{I}{r}$",
             "$B = 2\\times10^{-7}\\dfrac{I}{r}$",
             "$B = 2\\pi\\times10^{-7}\\dfrac{NI}{R}$",
             "$B = 4\\pi\\times10^{-7}nI$"],
    ans:1,
    explain:"Dây thẳng dài vô hạn: $B = 2\\times10^{-7}\\dfrac{I}{r}$ (T). Đường sức từ là các đường tròn đồng tâm nằm trong mặt phẳng vuông góc dây, có tâm trên dây." },

  { id:14, topic:"Cảm ứng từ dây thẳng", level:"NB",
    text:"Đường sức từ của dây dẫn thẳng dài mang dòng điện có hình dạng",
    choices:["Các đường thẳng vuông góc dây",
             "Các đường tròn đồng tâm nằm trong mặt phẳng vuông góc dây, tâm trên dây",
             "Các đường xoắn ốc quanh dây",
             "Các đường elip quanh dây"],
    ans:1,
    explain:"Đường sức từ của dây thẳng dài là <b>các đường tròn đồng tâm</b>, nằm trong mặt phẳng vuông góc với dây, có tâm nằm trên dây." },

  { id:15, topic:"Cảm ứng từ dây thẳng", level:"TH",
    text:"Dây dẫn thẳng dài mang dòng $I = 5\\,\\text{A}$. Cảm ứng từ tại điểm cách dây $r = 10\\,\\text{cm}$ là",
    choices:["$2{,}5\\times10^{-6}\\,\\text{T}$",
             "$10^{-5}\\,\\text{T}$",
             "$2\\times10^{-5}\\,\\text{T}$",
             "$5\\times10^{-6}\\,\\text{T}$"],
    ans:1,
    explain:"$B = 2\\times10^{-7}\\times\\dfrac{5}{0{,}1} = 2\\times10^{-7}\\times50 = \\mathbf{10^{-5}}\\,\\text{T}$." },

  { id:16, topic:"Cảm ứng từ dây thẳng", level:"TH",
    text:"Cảm ứng từ tại điểm M cách dây thẳng dài $r = 5\\,\\text{cm}$ là $B = 4\\times10^{-6}\\,\\text{T}$. Dòng điện trong dây là",
    choices:["$0{,}5\\,\\text{A}$",
             "$1\\,\\text{A}$",
             "$2\\,\\text{A}$",
             "$4\\,\\text{A}$"],
    ans:1,
    explain:"$I = \\dfrac{B\\cdot r}{2\\times10^{-7}} = \\dfrac{4\\times10^{-6}\\times0{,}05}{2\\times10^{-7}} = \\dfrac{2\\times10^{-7}}{2\\times10^{-7}} = \\mathbf{1}\\,\\text{A}$." },

  { id:17, topic:"Cảm ứng từ dây thẳng", level:"TH",
    text:"Tăng dòng điện trong dây thẳng dài lên 3 lần và giảm khoảng cách đến dây xuống 3 lần thì cảm ứng từ $B$ thay đổi thế nào?",
    choices:["Tăng 3 lần",
             "Tăng 9 lần",
             "Không đổi",
             "Giảm 3 lần"],
    ans:1,
    explain:"$B = 2\\times10^{-7}\\dfrac{I}{r}$. Khi $I' = 3I$ và $r' = r/3$ thì $B' = 2\\times10^{-7}\\dfrac{3I}{r/3} = 9\\times2\\times10^{-7}\\dfrac{I}{r} = \\mathbf{9B}$." },

  { id:18, topic:"Cảm ứng từ dây thẳng", level:"VD",
    text:"Hai dây dẫn thẳng dài song song cách nhau $d = 20\\,\\text{cm}$, mang dòng $I_1 = 3\\,\\text{A}$ và $I_2 = 5\\,\\text{A}$ cùng chiều. Cảm ứng từ tổng hợp tại điểm M trên đường nối hai dây, cách dây 1 đoạn $r_1 = 8\\,\\text{cm}$ bằng",
    choices:["$5{,}83\\times10^{-6}\\,\\text{T}$",
             "$0{,}83\\times10^{-6}\\,\\text{T}$",
             "$2{,}5\\times10^{-6}\\,\\text{T}$",
             "$4{,}17\\times10^{-6}\\,\\text{T}$"],
    ans:0,
    explain:"$r_2 = 20-8=12\\,\\text{cm}$. $B_1 = 2\\times10^{-7}\\dfrac{3}{0{,}08} = 7{,}5\\times10^{-6}\\,\\text{T}$; $B_2 = 2\\times10^{-7}\\dfrac{5}{0{,}12} \\approx 8{,}33\\times10^{-6}\\,\\text{T}$. M nằm giữa hai dây cùng chiều nên $\\vec{B}_1, \\vec{B}_2$ ngược chiều: $B = |B_2 - B_1| \\approx \\mathbf{5{,}83\\times10^{-6}}\\,\\text{T}$." },

  /* ===== CẢM ỨNG TỪ VÒNG TRÒN ===== */
  { id:19, topic:"Cảm ứng từ vòng tròn", level:"NB",
    text:"Công thức tính cảm ứng từ tại tâm vòng dây tròn gồm $N$ vòng, bán kính $R$, mang dòng $I$ là",
    choices:["$B = 2\\times10^{-7}\\dfrac{I}{R}$",
             "$B = 2\\pi\\times10^{-7}\\dfrac{NI}{R}$",
             "$B = 4\\pi\\times10^{-7}nI$",
             "$B = 4\\pi\\times10^{-7}\\dfrac{NI}{R^2}$"],
    ans:1,
    explain:"Tâm vòng dây tròn $N$ vòng, bán kính $R$: $B = 2\\pi\\times10^{-7}\\dfrac{NI}{R}$." },

  { id:20, topic:"Cảm ứng từ vòng tròn", level:"NB",
    text:"Chiều của $\\vec{B}$ tại tâm vòng dây tròn mang dòng điện được xác định bằng",
    choices:["Quy tắc bàn tay trái",
             "Quy tắc nắm bàn tay phải: 4 ngón chỉ chiều dòng, ngón cái chỉ chiều $\\vec{B}$",
             "Quy tắc vào Nam ra Bắc",

var studentName = "", roundHistory = [], activeQS = QS.slice();

/* === LOGIN === */
function startTest() {
  var nm = document.getElementById("inp-name").value.trim();
  if (!nm) { document.getElementById("inp-name").focus(); return; }
  studentName = nm;
  roundHistory = []; activeQS = QS.slice(); roundNum = 1; cumulativeCorrect = 0;
  beginRound();
}

/* === ROUND === */
function beginRound() {
  curQ = 0;
  answers = new Array(activeQS.length).fill(null);
  document.getElementById("round-label").textContent =
    roundNum === 1 ? "Lượt 1 · " + activeQS.length + " câu"
                   : "Lượt " + roundNum + " · Ôn " + activeQS.length + " câu sai";
  showScreen("s-test");
  renderQ();
}

/* === TEST === */
function renderDots() {
  var nav = document.getElementById("dot-nav"); nav.innerHTML = "";
  activeQS.forEach(function(_, i) {
    var d = document.createElement("button");
    d.className = "dot" + (i===curQ?" current":answers[i]!==null?" answered":"");
    d.textContent = i+1;
    d.onclick = (function(idx){ return function(){ curQ=idx; renderQ(); }; })(i);
    nav.appendChild(d);
  });
}

function renderQ() {
  var q = activeQS[curQ];
  document.getElementById("q-counter").textContent = "Câu " + (curQ+1) + "/" + activeQS.length;
  document.getElementById("progress").style.width = ((curQ+1)/activeQS.length*100)+"%";
  document.getElementById("q-text").innerHTML = q.text;
  var cd = document.getElementById("choices"); cd.innerHTML = "";
  ["A","B","C","D"].forEach(function(l, ci) {
    var b = document.createElement("button");
    b.className = "choice-btn" + (answers[curQ]===ci ? " selected" : "");
    b.innerHTML = "<b>" + l + ".</b> " + q.choices[ci];
    b.onclick = (function(i){ return function(){ answers[curQ]=i; renderQ(); }; })(ci);
    cd.appendChild(b);
  });
  var pb = document.getElementById("btn-prev");
  pb.disabled = curQ===0; pb.style.opacity = curQ===0?"0.35":"1";
  document.getElementById("btn-next").textContent = curQ===activeQS.length-1 ? "Nộp bài ✓" : "Tiếp →";
  if (window.MathJax && MathJax.typesetPromise)
    MathJax.typesetPromise([document.getElementById("q-text"), document.getElementById("choices")]).catch(function(){});
  renderDots();
}

function prevQ() { if (curQ>0){ curQ--; renderQ(); } }
function nextQ() {
  if (curQ < activeQS.length-1) { curQ++; renderQ(); return; }
  var miss = answers.filter(function(a){ return a===null; }).length;
  if (miss>0 && !confirm("Còn " + miss + " câu chưa chọn. Nộp bài?")) return;
  submitRound();
}

  cumulativeCorrect += roundCorrect;
  if (sheetsUrl) {
    var cls = (document.getElementById("inp-class")||{value:""}).value.trim();
    var score10 = Math.round(cumulativeCorrect/TOTAL_ORIGINAL*10*10)/10;
    var url = sheetsUrl + "?" + [
      "examName=" + encodeURIComponent(EXAM_NAME),
      "luot="     + roundNum,
      "name="     + encodeURIComponent(studentName),
      "className="+ encodeURIComponent(cls),
      "score10="  + score10
    ].join("&");
    if (typeof fetch !== "undefined") {
      fetch(url, {method:"GET", mode:"no-cors"}).catch(function(){});
    } else { var img = new Image(); img.src = url; }
  }
  showResult(wrongQS);
}

/* === RESULT === */
function showResult(wrongQS) {
  var score10 = Math.round(cumulativeCorrect/TOTAL_ORIGINAL*10*10)/10;
  document.getElementById("score-num").textContent = score10%1===0 ? score10.toFixed(1) : score10;
  document.getElementById("result-name").textContent = studentName;
  document.getElementById("round-badge").innerHTML =
    '<span class="badge" style="background:#ebf2fb;color:#0c447c">Lượt ' + roundNum +
    ' · Làm ' + activeQS.length + ' câu · Đúng ' +
    roundHistory[roundHistory.length-1].correct + ' câu</span>';

  var hc = document.getElementById("hist-card");
  if (roundHistory.length > 1) {
    hc.style.display = "block";
    document.getElementById("hist-rows").innerHTML = roundHistory.map(function(r){
      var p = Math.round(r.correct/r.qs.length*100);
      var col = p>=70?"#1d7a4f":p>=40?"#7a4a0a":"#7a1f1f";
      return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f4fb">' +
        '<span style="font-size:13px">Lượt ' + r.rn + ' (' + r.qs.length + ' câu)</span>' +
        '<span style="font-size:13px;font-weight:600;color:'+col+'">' + r.correct + '/' + r.qs.length + ' đúng (' + p + '%)</span>' +
      '</div>';
    }).join("");
  } else { hc.style.display = "none"; }

  var dc = document.getElementById("detail-card");
  var letters = ["A","B","C","D"];
  if (wrongQS.length===0) {
    dc.innerHTML = '<div style="text-align:center;color:#1d7a4f;font-weight:600;padding:12px">Tuyệt vời! Không có câu sai.</div>';
  } else {
    dc.innerHTML = '<div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:8px">Câu sai lượt này</div>' +
      wrongQS.map(function(q) {
        var ri = activeQS.indexOf(q);
        var ua = answers[ri];
        var ul = ua!==null ? letters[ua] : "–";
        return '<div style="padding:10px 0;border-bottom:1px solid #f0f4fb">' +
          '<div style="font-size:13px;color:#888;margin-bottom:2px">' + q.topic + '</div>' +
          '<div style="font-size:14px;font-weight:500;margin-bottom:4px">' + q.id + '. ' + q.text + '</div>' +
          '<div style="font-size:12px;color:#7a1f1f">Bạn chọn: <b>' + ul + '</b> · Đúng: <b>' + letters[q.ans] + '</b></div>' +
          '<div style="font-size:12px;color:#555;margin-top:4px;background:#f5f7fa;padding:6px;border-radius:6px">' + q.explain + '</div>' +
        '</div>';
      }).join("");
  }

  var allCorrectIds = {};
  roundHistory.forEach(function(r){ r.qs.forEach(function(q,i){ if(r.ans[i]===q.ans) allCorrectIds[q.id]=true; }); });
  var weakTopics = TOPICS.filter(function(t){
    var ok=0,tot=0;
    QS.forEach(function(q){ if(q.topic===t){tot++;if(allCorrectIds[q.id])ok++;} });
    return tot>0 && (ok/tot)<0.6;
  });
  var pr = document.getElementById("plan-rows");
  if (weakTopics.length===0) {
    pr.innerHTML = '<div style="text-align:center;color:#1d7a4f;font-weight:600;padding:8px">Xuất sắc! Bạn nắm vững tất cả chủ đề.</div>';
  } else {
    pr.innerHTML = weakTopics.map(function(t){
      var p = PLAN[t];
      var wc = wrongQS.filter(function(q){ return q.topic===t; }).length;
      return '<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f0f4fb">' +
        '<div style="font-weight:600;margin-bottom:6px">' + t + (wc>0?' <span style="font-size:12px;background:#fdeaea;color:#7a1f1f;padding:1px 8px;border-radius:10px">'+wc+' câu sai</span>':'') + '</div>' +
        '<div style="background:#f0f4fb;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:13px">' + p.formula + '</div>' +
        p.notes.map(function(n){ return '<div style="font-size:13px;color:#333;padding:2px 0">• ' + n + '</div>'; }).join("") +
      '</div>';
    }).join("");
  }
  if (window.MathJax && MathJax.typesetPromise)
    MathJax.typesetPromise([document.getElementById("s-result")]).catch(function(){});

  var rb = document.getElementById("btn-retry");
  if (wrongQS.length > 0) {
    rb.style.display = "flex";
    rb.textContent = "Lượt " + (roundNum+1) + ": Ôn lại " + wrongQS.length + " câu sai →";
    window._nextWrongQS = wrongQS;
  } else { rb.style.display = "none"; }

  var sv = document.getElementById("btn-save");
  if (sv) { sv.style.cssText = "display:flex!important"; }

  showScreen("s-result");
}

function startRetry() {
  roundNum++;
  activeQS = (window._nextWrongQS||[]).slice();
  window._nextWrongQS = null;
  var ni=document.getElementById("inp-name"); if(ni) ni.value=studentName;
  beginRound();
}

function restartFull() {
  roundHistory=[]; activeQS=QS.slice(); roundNum=1; cumulativeCorrect=0;
  document.getElementById("inp-name").value="";
  showScreen("s-login");
}

/* === SAVE === */
function doSave() {
  var wrongQS = window._nextWrongQS || [];
  var wqJ = JSON.stringify(wrongQS).replace(new RegExp("<\\/","g"),"<\\/");
  var hiJ = JSON.stringify(roundHistory).replace(new RegExp("<\\/","g"),"<\\/");
  var nmJ = JSON.stringify(studentName);
  var clJ = JSON.stringify(document.getElementById("inp-class").value||"");
  var nw  = wrongQS.length;
  var blJ = JSON.stringify("Lượt "+(roundNum+1)+": Ôn lại "+nw+" câu sai →");

  document.querySelectorAll(".screen").forEach(function(s){
    s.setAttribute("_d",s.style.display||"");
    s.style.display = s.id==="s-result"?"block":"none";
  });
  document.getElementById("btn-save").style.visibility="hidden";
  var snap = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
  document.querySelectorAll(".screen").forEach(function(s){ s.style.display=s.getAttribute("_d")||""; });
  document.getElementById("btn-save").style.visibility="";

  snap = snap.replace("</style>",
    "\n/* ==SAVED== */ .screen{display:none!important} #s-result{display:block!important}\n</style>"
  );
  snap = snap.replace(/showScreen\("s-login"\);?/g,"/* noinit */");

  var L = [];
  L.push("<scr"+"ipt>");
  L.push("var _D={wq:"+wqJ+",rn:"+roundNum+",cc:"+cumulativeCorrect+",hi:"+hiJ+",nm:"+nmJ+",cl:"+clJ+",tt:"+TOTAL_ORIGINAL+"};");
  L.push("function doRetryFromSaved(){");
  L.push("  studentName=_D.nm;roundHistory=_D.hi;activeQS=_D.wq.slice();");
  L.push("  roundNum=_D.rn+1;cumulativeCorrect=_D.cc;TOTAL_ORIGINAL=_D.tt;");
  L.push("  window._nextWrongQS=null;");
  L.push("  var ni=document.getElementById('inp-name');if(ni)ni.value=_D.nm;");
  L.push("  var ci=document.getElementById('inp-class');if(ci)ci.value=_D.cl;");
  L.push("  var ovr=document.createElement('style');ovr.textContent='.screen{display:none!important}#s-test.active,#s-result.active,#s-login.active{display:block!important}';document.head.appendChild(ovr);");
  L.push("  beginRound();");
  L.push("}");
  L.push("window.addEventListener('DOMContentLoaded',function(){");
  L.push("  var rb=document.getElementById('btn-retry');");
  L.push("  if(rb&&_D.wq.length>0){rb.style.cssText='display:flex!important';rb.textContent="+blJ+";rb.onclick=doRetryFromSaved;}");
  L.push("  else if(rb){rb.style.display='none';}");
  L.push("  var sv=document.getElementById('btn-save');if(sv)sv.style.display='none';");
  L.push("  var rs=document.getElementById('btn-restart');if(rs)rs.style.display='none';");
  L.push("});");
  L.push("</" + "script>");
  var injected = L.join("\n");

  snap = snap.replace(/<script>\n?var _D=[\s\S]*?<\/script>\n?/g, "");
  var bi = snap.lastIndexOf("</body>");
  snap = snap.slice(0,bi) + injected + "\n" + snap.slice(bi);

  var name = (studentName||"hs").replace(/\s+/g,"_")+"_"+EXAM_NAME+"_luot"+roundNum+".html";
  var blob = new Blob([snap],{type:"text/html;charset=utf-8"});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement("a"); a.href=url; a.download=name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); },3000);
}

/* === UTILS === */
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(function(s){ s.classList.remove("active"); });
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}

if(typeof _D==="undefined"){ showScreen("s-login"); }
</script>
</body>
</html>
