  /* ===== 2. CÔNG ===== */
  { id:6, topic:"Công cơ học", level:"NB",
    text:"Công thức tính công của lực $\\vec{F}$ khi vật dịch chuyển quãng đường $s$, góc giữa lực và chiều dịch chuyển là $\\alpha$:",
    choices:["$A = Fs\\sin\\alpha$",

    explain:"$A = Fs\\cos\\alpha$ (J). $F$ (N), $s$ (m), $\\alpha$: góc giữa $\\vec{F}$ và chiều dịch chuyển. Đơn vị: $1\\,\\text{J} = 1\\,\\text{N}\\cdot\\text{m}$." },

  { id:7, topic:"Công cơ học", level:"NB",
    text:"Khi góc $\\alpha = 90°$ giữa lực và chiều dịch chuyển thì công bằng",

    ans:2,
    explain:"$\\cos90° = 0$ → $A = Fs\\cos90° = 0$. Lực vuông góc với chiều dịch chuyển <b>không sinh công</b>. Ví dụ: lực pháp tuyến khi vật trượt trên mặt phẳng ngang." },

  { id:8, topic:"Công cơ học", level:"NB",

    ans:2,
    explain:"Khi $90° < \\alpha \\leq 180°$: $\\cos\\alpha < 0$ → $A = Fs\\cos\\alpha < 0$. Đây là <b>công cản</b> (lực cản trở chuyển động). Ví dụ: lực ma sát, lực cản không khí." },

  { id:9, topic:"Công cơ học", level:"NB",
    text:"Một lực sĩ giữ yên quả tạ nặng 50 kg trên đầu trong 5 giây. Công lực sĩ thực hiện lên quả tạ là",
    choices:["$2500\\,\\text{J}$",

    explain:"Quả tạ <b>không di chuyển</b> ($s = 0$) → $A = Fs\\cos\\alpha = 0$. Dù lực sĩ mệt nhưng công thực hiện lên quả tạ bằng 0 vì không có sự dịch chuyển." },

  { id:10, topic:"Công cơ học", level:"TH",
    text:"Kéo một vật khối lượng $m = 10\\,\\text{kg}$ trên mặt phẳng ngang với lực $F = 50\\,\\text{N}$ theo phương ngang, quãng đường $s = 6\\,\\text{m}$. Công của lực kéo là",
    choices:["$300\\,\\text{J}$",
             "$60\\,\\text{J}$",
             "$8{,}3\\,\\text{J}$",
             "$600\\,\\text{J}$"],
    ans:0,
    explain:"$\\alpha = 0°$ (lực cùng chiều dịch chuyển). $A = Fs\\cos0° = 50\\times6\\times1 = \\mathbf{300}\\,\\text{J}$." },

  { id:11, topic:"Công cơ học", level:"TH",
    text:"Lực kéo $F = 80\\,\\text{N}$ hợp với phương ngang góc $\\alpha = 30°$, kéo vật dịch chuyển $s = 5\\,\\text{m}$ trên mặt phẳng ngang. Công của lực kéo là",
    choices:["$400\\,\\text{J}$",
             "$200\\sqrt{3}\\,\\text{J}$",
             "$200\\,\\text{J}$",
             "$346\\,\\text{J}$"],
    ans:1,
    explain:"$A = Fs\\cos30° = 80\\times5\\times\\dfrac{\\sqrt{3}}{2} = 400\\times\\dfrac{\\sqrt{3}}{2} = \\mathbf{200\\sqrt{3}} \\approx 346\\,\\text{J}$." },

  { id:12, topic:"Công cơ học", level:"TH",
    text:"Vật trượt xuống mặt phẳng nghiêng dài $s = 4\\,\\text{m}$, góc nghiêng $30°$, $m = 2\\,\\text{kg}$, $g = 10\\,\\text{m/s}^2$. Công của trọng lực là",
    choices:["$80\\,\\text{J}$",
             "$40\\,\\text{J}$",
             "$40\\sqrt{3}\\,\\text{J}$",
             "$80\\sqrt{3}\\,\\text{J}$"],
    ans:1,
    explain:"Trọng lực hợp với chiều dịch chuyển (dọc mặt nghiêng) góc $(90°-30°)=60°$. $A_P = mgs\\cos60° = 2\\times10\\times4\\times0{,}5 = \\mathbf{40}\\,\\text{J}$. Hoặc: $A_P = mgh = mg\\cdot s\\sin30° = 20\\times4\\times0{,}5 = 40\\,\\text{J}$." },

  { id:13, topic:"Công cơ học", level:"TH",

             "$0\\,\\text{J}$",

    ans:1,
    explain:"Lực ma sát ngược chiều chuyển động ($\\alpha = 180°$). $A_f = fs\\cos180° = 20\\times3\\times(-1) = \\mathbf{-60}\\,\\text{J}$. Công cản." },

  { id:14, topic:"Công cơ học", level:"VD",
    text:"Vật $m = 5\\,\\text{kg}$ được kéo lên thẳng đứng đều với $v = \\text{const}$, $h = 3\\,\\text{m}$, $g = 10\\,\\text{m/s}^2$. Công của lực kéo và công của trọng lực lần lượt là",

             "$-150\\,\\text{J}$ và $150\\,\\text{J}$",
             "$0$ và $0$"],
    ans:0,
    explain:"Chuyển động đều: lực kéo $F = mg = 50\\,\\text{N}$. $A_{kéo} = Fh = 50\\times3 = 150\\,\\text{J}$. Trọng lực ngược chiều dịch chuyển: $A_P = -mgh = \\mathbf{-150}\\,\\text{J}$." },

  { id:15, topic:"Công cơ học", level:"VD",
    text:"Ôtô $m = 1000\\,\\text{kg}$ đi trên đường nằm ngang $s = 100\\,\\text{m}$ với lực kéo $F = 2000\\,\\text{N}$. Hệ số ma sát $\\mu = 0{,}1$, $g = 10\\,\\text{m/s}^2$. Công của hợp lực là",
    choices:["$200000\\,\\text{J}$",

    ans:1,
    explain:"$A_F = 2000\\times100 = 200000\\,\\text{J}$. $f = \\mu mg = 0{,}1\\times1000\\times10 = 1000\\,\\text{N}$. $A_f = -1000\\times100 = -100000\\,\\text{J}$. $A_{HL} = 200000-100000 = \\mathbf{100000}\\,\\text{J}$." },

  { id:16, topic:"Công cơ học", level:"VDC",
    text:"Vật $m = 4\\,\\text{kg}$ trượt trên mặt phẳng nghiêng góc $\\alpha=30°$, dài $L=5\\,\\text{m}$, $\\mu=0{,}2$, $g=10\\,\\text{m/s}^2$. Công của hợp lực theo chiều xuống dốc là",
    choices:["$100\\,\\text{J}$",

  { id:17, topic:"Công suất", level:"NB",
    text:"Công suất được định nghĩa là",

    explain:"$P = \\dfrac{A}{t}$ (W). Công suất đặc trưng cho <b>tốc độ thực hiện công</b> hay tốc độ sinh năng lượng của thiết bị." },

  { id:18, topic:"Công suất", level:"NB",

  { id:19, topic:"Công suất", level:"NB",
    text:"Khi lực $\\vec{F}$ cùng chiều chuyển động với vận tốc $v$, công suất tức thời là",

  { id:20, topic:"Công suất", level:"TH",
    text:"Thực hiện công $A = 600\\,\\text{J}$ trong $t = 2\\,\\text{phút}$. Công suất là",

    text:"Ôtô chuyển động với tốc độ $v = 72\\,\\text{km/h}$ và lực kéo $F = 3000\\,\\text{N}$. Công suất động cơ là",

    explain:"$A = Pt = 5\\,\\text{kW}\\times2\\,\\text{h} = \\mathbf{10}\\,\\text{kWh} = 5000\\times7200 = \\mathbf{36000000}\\,\\text{J}$. Cả B và C đều đúng (chỉ khác đơn vị)." },

  { id:23, topic:"Công suất", level:"TH",
    text:"Cần cẩu nâng vật $m = 1000\\,\\text{kg}$ lên cao $h = 10\\,\\text{m}$ trong $t = 20\\,\\text{s}$ ($g = 10\\,\\text{m/s}^2$). Công suất của cần cẩu là",

    formula: "$$W = \\dfrac{1}{2}mv^2 + mgz = \\text{const} \\quad (\\text{khi chỉ có lực thế})$$",
    notes: [
      "Bảo toàn khi chỉ có lực thế (trọng lực, lực đàn hồi) tác dụng",
      "Vị trí cân bằng: $W_{đ}$ max, $W_t$ min. Tại biên: $W_{đ} = 0$, $W_t$ max",
      "Có lực cản: $W_{đ} + W_t < W_{ban đầu}$ (cơ năng giảm)",
      "Năng lượng hao phí = nhiệt do lực cản sinh ra"
    ],
    exercises: [
      "Vật rơi từ $h=20\\,\\text{m}$. Tính $v$ khi ở $h=5\\,\\text{m}$ (bỏ qua cản).",
      "Bóng $m=0{,}2\\,\\text{kg}$ ném lên $v_0=15\\,\\text{m/s}$. Tính $h_{max}$ và $v$ tại $h=5\\,\\text{m}$."
    ]
  },
  "Con lắc đơn và cơ năng": {
    formula: "$$v = \\sqrt{2gl(\\cos\\alpha-\\cos\\alpha_0)} \\qquad T = mg(3\\cos\\alpha-2\\cos\\alpha_0)$$",
    notes: [
      "Mốc thế năng: tại vị trí cân bằng (thấp nhất)",
      "$v_{max} = \\sqrt{2gl(1-\\cos\\alpha_0)}$ tại vị trí cân bằng",
      "$T_{max} = mg(3-2\\cos\\alpha_0)$ tại cân bằng; $T_{min} = mg\\cos\\alpha_0$ tại biên",
      "Cơ năng: $W = mgl(1-\\cos\\alpha_0)$"
    ],
    exercises: [
      "Con lắc $l=2\\,\\text{m}$, $\\alpha_0=45°$. Tính $v_{max}$ và cơ năng ($m=0{,}3\\,\\text{kg}$).",
      "Con lắc $l=1\\,\\text{m}$, $\\alpha_0=30°$. Tính $T_{max}$ và $T_{min}$ ($m=0{,}5\\,\\text{kg}$)."
    ]
  },
  "Hiệu suất": {
    formula: "$$H = \\dfrac{W_{ci}}{W_{tp}}\\times100\\% = \\dfrac{P_{ci}}{P_{tp}}\\times100\\% < 100\\%$$",
    notes: [
      "Luôn có $H < 100\\%$ vì luôn có năng lượng hao phí",
      "Động cơ điện: $H \\approx 96\\%$; Đèn LED: $H \\approx 95\\%$; Đèn dây tóc: $H \\approx 7\\%$",
      "Động cơ nhiệt: $H = A/Q$ (công cơ học / nhiệt từ nhiên liệu)",
      "$H = 100\\%$ sẽ tạo ra động cơ vĩnh cửu loại 2 — điều không thể"
    ],
    exercises: [
      "Máy $P_{tp}=3\\,\\text{kW}$, $H=75\\%$. Tính $P_{ci}$ và $A_{ci}$ trong $1\\,\\text{h}$.",
      "Ôtô $v=30\\,\\text{m/s}$, $f=800\\,\\text{N}$, $H=40\\%$. Tính lượng xăng dùng trong $1\\,\\text{h}$ ($q=44\\times10^6\\,\\text{J/kg}$)."
    ]
  },
  "Tổng hợp": {
    formula: "$$A = Fs\\cos\\alpha \\quad P = Fv \\quad W = \\dfrac{1}{2}mv^2+mgz \\quad H = \\dfrac{W_{ci}}{W_{tp}}$$",
    notes: [
      "Định lý biến thiên động năng: $A_{HL} = \\Delta W_{đ}$",
      "Bảo toàn cơ năng: dùng khi không có lực cản",
      "Khi có lực cản: $A_{HL} = \\Delta W_{đ}$ vẫn đúng (A âm)",
      "Vận tốc cực đại: $v_{max} = P_{ci}/F_{cản}$"
    ],
    exercises: [
      "Xe $m=500\\,\\text{kg}$, $P=20\\,\\text{kW}$, $H=80\\%$, $f=400\\,\\text{N}$. Tính $v_{max}$.",
      "Vật trượt dốc $h=10\\,\\text{m}$, $s=20\\,\\text{m}$, $m=2\\,\\text{kg}$. Tính $v$ ở chân dốc và $\\mu$."

  }

/* === STATE === */
var studentName = "", roundHistory = [], activeQS = QS.slice();
var roundNum = 1, cumulativeCorrect = 0, TOTAL_ORIGINAL = QS.length;
var answers = [], curQ = 0;

function startTest() {
  var nm = document.getElementById("inp-name").value.trim();
  if (!nm) { document.getElementById("inp-name").focus(); return; }
  studentName = nm;
  roundHistory = []; activeQS = QS.slice(); roundNum = 1; cumulativeCorrect = 0;
  beginRound();
}
function beginRound() {
  curQ = 0;
  answers = new Array(activeQS.length).fill(null);
  document.getElementById("round-label").textContent =
    roundNum === 1 ? "Lượt 1 · " + activeQS.length + " câu"
                   : "Lượt " + roundNum + " · Ôn " + activeQS.length + " câu sai";
  showScreen("s-test"); renderQ();
}
function renderDots() {
  var nav = document.getElementById("dot-nav"); nav.innerHTML = "";
  activeQS.forEach(function(_, i) {
    var d = document.createElement("button");
    d.className = "dot" + (i===curQ?" current":answers[i]!==null?" answered":"");
    d.textContent = i+1;
    d.onclick = (function(idx){ return function(){ curQ=idx; renderQ(); }; })(i);
    nav.appendChild(d);
  });
}
function renderQ() {
  var q = activeQS[curQ];
  document.getElementById("q-counter").textContent = "Câu " + (curQ+1) + "/" + activeQS.length;
  document.getElementById("progress").style.width = ((curQ+1)/activeQS.length*100)+"%";
  document.getElementById("q-text").innerHTML = q.text;
  var cd = document.getElementById("choices"); cd.innerHTML = "";
  ["A","B","C","D"].forEach(function(l, ci) {
    var b = document.createElement("button");
    b.className = "choice-btn" + (answers[curQ]===ci ? " selected" : "");
    b.innerHTML = "<b>" + l + ".</b> " + q.choices[ci];
    b.onclick = (function(i){ return function(){ answers[curQ]=i; renderQ(); }; })(ci);
    cd.appendChild(b);
  });
  var pb = document.getElementById("btn-prev");
  pb.disabled = curQ===0; pb.style.opacity = curQ===0?"0.35":"1";
  document.getElementById("btn-next").textContent = curQ===activeQS.length-1 ? "Nộp bài ✓" : "Tiếp →";
  if (window.MathJax && MathJax.typesetPromise)
    MathJax.typesetPromise([document.getElementById("q-text"), document.getElementById("choices")]).catch(function(){});
  renderDots();
}
function prevQ() { if (curQ>0){ curQ--; renderQ(); } }
function nextQ() {
  if (curQ < activeQS.length-1) { curQ++; renderQ(); return; }
  var miss = answers.filter(function(a){ return a===null; }).length;
  if (miss>0 && !confirm("Còn " + miss + " câu chưa chọn. Nộp bài?")) return;
  submitRound();
}

var EXAM_NAME = "c4.nangluong";
var sheetsUrl = "https://script.google.com/macros/s/AKfycbwwIDXsY_OC6FDDJaJGrJdacv7n49YAoJn1i-xsvVLfkG2TZXEVtPCCdT1kxR3vzn-4/exec";

function submitRound() {
  var roundCorrect = answers.filter(function(a,i){ return a===activeQS[i].ans; }).length;
  var wrongQS = activeQS.filter(function(q,i){ return answers[i]!==q.ans; });
  roundHistory.push({ rn:roundNum, qs:activeQS.slice(), ans:answers.slice(), correct:roundCorrect });
  cumulativeCorrect += roundCorrect;
  if (sheetsUrl) {
    var cls = (document.getElementById("inp-class")||{value:""}).value.trim();
    var score10 = Math.round(cumulativeCorrect/TOTAL_ORIGINAL*10*10)/10;
    var url = sheetsUrl+"?"+["examName="+encodeURIComponent(EXAM_NAME),"luot="+roundNum,"name="+encodeURIComponent(studentName),"className="+encodeURIComponent(cls),"score10="+score10].join("&");
    if (typeof fetch!=="undefined") fetch(url,{method:"GET",mode:"no-cors"}).catch(function(){});
    else { var img=new Image(); img.src=url; }
  }
  showResult(wrongQS);
}
function showResult(wrongQS) {
  var score10 = Math.round(cumulativeCorrect/TOTAL_ORIGINAL*10*10)/10;
  document.getElementById("score-num").textContent = score10%1===0?score10.toFixed(1):score10;
  document.getElementById("result-name").textContent = studentName;
  document.getElementById("round-badge").innerHTML =
    '<span class="badge" style="background:#ebf2fb;color:#0c447c">Lượt '+roundNum+' · Làm '+activeQS.length+' câu · Đúng '+roundHistory[roundHistory.length-1].correct+' câu</span>';
  var hc=document.getElementById("hist-card");
  if (roundHistory.length>1) {
    hc.style.display="block";
    document.getElementById("hist-rows").innerHTML=roundHistory.map(function(r){
      var p=Math.round(r.correct/r.qs.length*100),col=p>=70?"#1d7a4f":p>=40?"#7a4a0a":"#7a1f1f";
      return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f4fb"><span style="font-size:13px">Lượt '+r.rn+' ('+r.qs.length+' câu)</span><span style="font-size:13px;font-weight:600;color:'+col+'">'+r.correct+'/'+r.qs.length+' đúng ('+p+'%)</span></div>';
    }).join("");
  } else { hc.style.display="none"; }
  var dc=document.getElementById("detail-card"),letters=["A","B","C","D"];
  if (wrongQS.length===0) {
    dc.innerHTML='<div style="text-align:center;color:#1d7a4f;font-weight:600;padding:12px">Tuyệt vời! Không có câu sai.</div>';
  } else {
    dc.innerHTML='<div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:8px">Câu sai lượt này</div>'+
      wrongQS.map(function(q){
        var ri=activeQS.indexOf(q),ua=answers[ri],ul=ua!==null?letters[ua]:"–";
        return '<div style="padding:10px 0;border-bottom:1px solid #f0f4fb"><div style="font-size:13px;color:#888;margin-bottom:2px">'+q.topic+'</div><div style="font-size:14px;font-weight:500;margin-bottom:4px">'+q.id+'. '+q.text+'</div><div style="font-size:12px;color:#7a1f1f">Bạn chọn: <b>'+ul+'</b> · Đúng: <b>'+letters[q.ans]+'</b></div><div style="font-size:12px;color:#555;margin-top:4px;background:#f5f7fa;padding:6px;border-radius:6px">'+q.explain+'</div></div>';
      }).join("");
  }
  var allCorrectIds={};
  roundHistory.forEach(function(r){ r.qs.forEach(function(q,i){ if(r.ans[i]===q.ans) allCorrectIds[q.id]=true; }); });
  var weakTopics=TOPICS.filter(function(t){ var ok=0,tot=0; QS.forEach(function(q){ if(q.topic===t){tot++;if(allCorrectIds[q.id])ok++;} }); return tot>0&&(ok/tot)<0.6; });
  var pr=document.getElementById("plan-rows");
  if (weakTopics.length===0) {
    pr.innerHTML='<div style="text-align:center;color:#1d7a4f;font-weight:600;padding:8px">Xuất sắc! Bạn nắm vững tất cả chủ đề.</div>';
  } else {
    pr.innerHTML=weakTopics.map(function(t){
      var p=PLAN[t],wc=wrongQS.filter(function(q){ return q.topic===t; }).length;
      return '<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f0f4fb"><div style="font-weight:600;margin-bottom:6px">'+t+(wc>0?' <span style="font-size:12px;background:#fdeaea;color:#7a1f1f;padding:1px 8px;border-radius:10px">'+wc+' câu sai</span>':'')+'</div><div style="background:#f0f4fb;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:13px">'+p.formula+'</div>'+p.notes.map(function(n){ return '<div style="font-size:13px;color:#333;padding:2px 0">• '+n+'</div>'; }).join("")+'</div>';
    }).join("");
  }
  if (window.MathJax&&MathJax.typesetPromise) MathJax.typesetPromise([document.getElementById("s-result")]).catch(function(){});
  var rb=document.getElementById("btn-retry");
  if (wrongQS.length>0){ rb.style.display="flex"; rb.textContent="Lượt "+(roundNum+1)+": Ôn lại "+wrongQS.length+" câu sai →"; window._nextWrongQS=wrongQS; }
  else { rb.style.display="none"; }
  var sv=document.getElementById("btn-save"); if(sv) sv.style.cssText="display:flex!important";
  showScreen("s-result");
}
function startRetry() {
  roundNum++; activeQS=(window._nextWrongQS||[]).slice(); window._nextWrongQS=null;
  var ni=document.getElementById("inp-name"); if(ni) ni.value=studentName;
  beginRound();
}
function restartFull() {
  roundHistory=[]; activeQS=QS.slice(); roundNum=1; cumulativeCorrect=0;
  document.getElementById("inp-name").value=""; showScreen("s-login");
}
function doSave() {
  var wrongQS=window._nextWrongQS||[];
  var wqJ=JSON.stringify(wrongQS).replace(new RegExp("<\\/","g"),"<\\/");
  var hiJ=JSON.stringify(roundHistory).replace(new RegExp("<\\/","g"),"<\\/");
  var nmJ=JSON.stringify(studentName);
  var clJ=JSON.stringify(document.getElementById("inp-class").value||"");
  var nw=wrongQS.length;
  var blJ=JSON.stringify("Lượt "+(roundNum+1)+": Ôn lại "+nw+" câu sai →");
  document.querySelectorAll(".screen").forEach(function(s){ s.setAttribute("_d",s.style.display||""); s.style.display=s.id==="s-result"?"block":"none"; });
  document.getElementById("btn-save").style.visibility="hidden";
  var snap="<!DOCTYPE html>\n"+document.documentElement.outerHTML;
  document.querySelectorAll(".screen").forEach(function(s){ s.style.display=s.getAttribute("_d")||""; });
  document.getElementById("btn-save").style.visibility="";
  snap=snap.replace("</style>","\n/* ==SAVED== */ .screen{display:none!important} #s-result{display:block!important}\n</style>");
  snap=snap.replace(/showScreen\("s-login"\);?/g,"/* noinit */");
  var L=[];
  L.push("<scr"+"ipt>");
  L.push("var _D={wq:"+wqJ+",rn:"+roundNum+",cc:"+cumulativeCorrect+",hi:"+hiJ+",nm:"+nmJ+",cl:"+clJ+",tt:"+TOTAL_ORIGINAL+"};");
  L.push("function doRetryFromSaved(){studentName=_D.nm;roundHistory=_D.hi;activeQS=_D.wq.slice();roundNum=_D.rn+1;cumulativeCorrect=_D.cc;TOTAL_ORIGINAL=_D.tt;window._nextWrongQS=null;var ni=document.getElementById('inp-name');if(ni)ni.value=_D.nm;var ci=document.getElementById('inp-class');if(ci)ci.value=_D.cl;var ovr=document.createElement('style');ovr.textContent='.screen{display:none!important}#s-test.active,#s-result.active,#s-login.active{display:block!important}';document.head.appendChild(ovr);beginRound();}");
  L.push("window.addEventListener('DOMContentLoaded',function(){var rb=document.getElementById('btn-retry');if(rb&&_D.wq.length>0){rb.style.cssText='display:flex!important';rb.textContent="+blJ+";rb.onclick=doRetryFromSaved;}else if(rb){rb.style.display='none';}var sv=document.getElementById('btn-save');if(sv)sv.style.display='none';var rs=document.getElementById('btn-restart');if(rs)rs.style.display='none';});");
  L.push("</"+"script>");
  var injected=L.join("\n");
  snap=snap.replace(/<script>\n?var _D=[\s\S]*?<\/script>\n?/g,"");
  var bi=snap.lastIndexOf("</body>");
  snap=snap.slice(0,bi)+injected+"\n"+snap.slice(bi);
  var name=(studentName||"hs").replace(/\s+/g,"_")+"_"+EXAM_NAME+"_luot"+roundNum+".html";
  var blob=new Blob([snap],{type:"text/html;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a"); a.href=url; a.download=name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); },3000);
}
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(function(s){ s.classList.remove("active"); });
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}
if(typeof _D==="undefined"){ showScreen("s-login"); }
